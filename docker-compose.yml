services:
  conduit-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONDUIT_HOST: 0.0.0.0
      CONDUIT_PORT: 18423
      CONDUIT_DB_PATH: /app/data/conduit.db
      CONDUIT_MODELS_CONFIG_PATH: /app/config/models.yaml
      CONDUIT_TOOL_PERMISSIONS_PATH: /app/config/tools.yaml
    ports:
      - "${CONDUIT_PUBLISH_IP:-127.0.0.1}:18423:18423"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18423/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
